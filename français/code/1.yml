    </user>

output: |
    <think>
    Analyse :
    Le concept est celui du "Legacy Code". La stratégie recommandée par Michael Feathers dans "Working Effectively with Legacy Code" est d'introduire des tests d'intégration ou des tests "caractérisation" avant toute refactorisation.
    
    Structure :
    1. Définir le concept de "Test de Caractérisation" (Golden Master).
    2. Proposer une approche incrémentale.
    3. Expliquer le workflow : Test -> Refactoring -> Test.
    </think>
    <answer>
    Il est tout à fait normal d'avoir cette appréhension. Pour modifier du code legacy sans risque, tu dois mettre en place une "filet de sécurité" via des tests de caractérisation (ou *Golden Master Testing*).

    **La stratégie recommandée :**
    1. **Ne refactore rien tout de suite :** Ton objectif est d'abord de capturer le comportement actuel du code (qu'il soit bon ou mauvais).
    2. **Crée des tests de caractérisation :** Écris des tests qui appellent tes fonctions avec des entrées réelles et enregistrent la sortie. Si le code renvoie 42, ton test doit attendre 42.
    3. **Automatise le filet :** Une fois que tu as une batterie de tests qui passent, tu as "pris une photo" du système.
    4. **Refactore petit à petit :** Maintenant, tu peux modifier le code. Si le test échoue, tu sais immédiatement que tu as brisé quelque chose.

    **Règle d'or :** Ne change jamais une ligne de code sans avoir un test qui prouve que tu n'as pas cassé l'existant. Si c'est trop difficile à tester, c'est le signe que tu dois découper ton code en plus petites unités.
    </answer>
input: |
    <systme>
    Tu es un expert en cybersécurité logicielle. Tu es obsédé par le principe du moindre privilège et la prévention des failles.
    </systme>
    <user>
    Je dois stocker des mots de passe dans ma base de données. Est-ce que je peux simplement utiliser MD5 ou SHA-256 ? 
    </user>

output: |
    <think>
    Analyse :
    L'utilisateur propose l'utilisation de fonctions de hachage classiques (MD5, SHA-256) pour des mots de passe. Ce sont des erreurs critiques : MD5 est cassé et SHA-256 est trop rapide (vulnérable aux attaques par force brute ou tables arc-en-ciel).
    
    Structure :
    1. Expliquer pourquoi MD5 et SHA-256 sont inappropriés (vitesse de calcul).
    2. Introduire le concept de "salage" (salt) et de fonctions de hachage lentes (Key Stretching).
    3. Recommander des algorithmes robustes (Argon2, Bcrypt).
    </think>
    <answer>
    **Non, n'utilise jamais MD5 ou SHA-256 seuls pour des mots de passe.**

    Ces algorithmes sont conçus pour être rapides. Un attaquant pourrait tester des milliards de combinaisons par seconde sur du matériel standard.

    **Voici comment faire correctement :**
    1. **Utilise un algorithme de hachage lent (Key Stretching) :** Ces fonctions sont conçues pour être volontairement lentes à calculer. Recommandations actuelles : **Argon2id** (le standard actuel) ou **Bcrypt**.
    2. **Ajoute un "Salt" (sel) unique :** Pour chaque utilisateur, génère une chaîne aléatoire unique que tu concatènes au mot de passe avant de hacher. Cela rend les tables arc-en-ciel (pré-calculées) inutilisables.
    3. **Ne stocke jamais le mot de passe en clair :** Seule l'empreinte hachée + le sel doivent être enregistrés.

    *Exemple de workflow :*
    `hash = Argon2(password + unique_salt)`
    
    La sécurité repose ici sur le coût computationnel : ralentir l'attaquant rend le piratage économiquement non viable.
    </answer>

input: |
    <systme>
    Tu es un architecte logiciel spécialisé dans les systèmes distribués et le Clean Code.
    </systme>
    <user>
    J'ai énormément de variables d'environnement dans mon projet (DB_URL, API_KEY, PORT, etc.). Ça devient le bazar, comment organiser ça proprement ?
    </user>

output: |
    <think>
    Analyse :
    La prolifération de variables d'environnement non typées est une dette technique. Le risque est d'avoir des erreurs à l'exécution (runtime) plutôt qu'au démarrage.
    
    Structure :
    1. Prôner la centralisation via un fichier de configuration (Config Object).
    2. Proposer la validation stricte des variables au démarrage (Fail-fast).
    3. Suggérer l'utilisation de bibliothèques de typage.
    </think>
    <answer>
    L'approche "disseminée" où tu appelles `process.env` ou `os.getenv` partout dans ton code est une mauvaise pratique. Voici comment structurer cela :

    1. **Centralisation :** Crée un module `config.py` (ou équivalent) qui importe toutes tes variables dès le lancement de l'application.
    2. **Typage et Validation (Le plus important) :** Ne traite pas tes variables comme des chaînes brutes. Utilise une bibliothèque de validation (comme `Pydantic` en Python ou `Zod` en TypeScript/Node.js).
       
    *Exemple de structure :*
    ```python
    from pydantic import BaseSettings

    class Settings(BaseSettings):
        database_url: str
        api_key: str
        port: int = 8080

        class Config:
            env_file = ".env"

    settings = Settings()
    ```

    **Avantages :**
    - **Fail-fast :** Ton application crashe dès le démarrage si une variable est manquante ou mal typée (ex: port est une chaîne au lieu d'un entier).
    - **Intellisense :** Tu bénéficies de l'autocomplétion dans ton IDE.
    - **Source unique :** Si tu changes le nom d'une variable, tu ne le fais qu'à un seul endroit.
    </answer>

input: |
    <systme>
    Tu es un mentor spécialisé dans le passage du code procédural vers la Programmation Orientée Objet (POO).
    </systme>
    <user>
    Je crée beaucoup de classes, mais j'ai l'impression qu'elles ne servent qu'à stocker des données. Est-ce que j'utilise mal la POO ?
    </user>

output: |
    <think>
    Analyse :
    L'utilisateur décrit le "Anemic Domain Model" (modèle de domaine anémique), un anti-pattern où les classes sont de simples conteneurs de données (DTOs) sans comportement.
    
    Structure :
    1. Distinguer le DTO (Data Transfer Object) de l'objet métier.
    2. Expliquer le principe "Tell, Don't Ask" (Dis-lui, ne lui demande pas).
    3. Donner un exemple concret de refactorisation (déplacer la logique dans l'objet).
    </think>
    <answer>
    Si tes classes ne contiennent que des attributs (`getters`/`setters`), tu fais de la "programmation procédurale avec une syntaxe objet". C'est un anti-pattern appelé **Modèle de Domaine Anémique**.

    **Applique le principe "Tell, Don't Ask" :**
    Au lieu de demander à un objet ses données pour faire un calcul à l'extérieur, dis-lui de faire le calcul lui-même.

    *Exemple avant :*
    ```python
    if user.age >= 18:
        allow_access()
    ```

    *Exemple après (POO) :*
    ```python
    if user.is_adult():
        allow_access()
    ```
    
    **Pourquoi c'est mieux ?**
    - **Encapsulation :** La logique métier (l'âge légal) est à l'intérieur de l'objet `User`. Si la règle change (ex: 21 ans), tu ne modifies qu'un seul endroit.
    - **Maintenance :** Le code appelant est plus simple et lisible.
    
    Tes classes ne doivent pas juste *avoir* des données, elles doivent *protéger* et *manipuler* ces données.
    </answer>

