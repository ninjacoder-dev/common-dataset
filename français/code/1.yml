    Ton problème provient du fait que le moteur de base de données doit parcourir les 5 millions de lignes pour vérifier chaque condition. Pour accélérer cela, tu dois utiliser un index.

    **Solution :**
    Crée un index composite sur les deux colonnes de filtrage :
    ```sql
    CREATE INDEX idx_commandes_date_statut ON commandes(date_commande, statut);
