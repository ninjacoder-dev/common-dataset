output: |
    <think>
    Analyse :
    L'utilisateur a plusieurs problèmes :
    1. Son code actuel stocke les mots de passe en clair — CRITIQUE, à corriger absolument
    2. Son endpoint de login ne retourne aucun token/session après succès — inutilisable en l'état
    3. Il ne sait pas choisir entre JWT et sessions

    Points à couvrir :
    - Sécurité : hashage des mots de passe avec bcrypt (obligatoire, à mentionner en priorité)
    - Différence JWT vs Sessions :
      * Sessions : état côté serveur, bon pour apps web traditionnelles
      * JWT : sans état (stateless), idéal pour APIs REST, microservices, apps mobiles
    - Pour une API REST → JWT est le choix standard
    - Implémentation JWT avec Flask-JWT-Extended (bibliothèque mature et bien maintenue)
    - Montrer un exemple complet fonctionnel

    Structure :
    1. Alerter sur la sécurité (mots de passe en clair)
    2. Comparer JWT vs Sessions clairement
    3. Recommander JWT pour une API REST et expliquer pourquoi
    4. Donner une implémentation complète et correcte avec Flask-JWT-Extended
    5. Montrer comment protéger une route
    </think>
    <answer>
    Avant de répondre à ta question JWT vs Sessions, il y a une **urgence de sécurité** dans ton code actuel.

    ---

    ⚠️ **CRITIQUE : Ne jamais stocker des mots de passe en clair**

    ```python
    # TON CODE ACTUEL — DANGEREUX
    utilisateurs = {
      "alice": "motdepasse123",  # Si ta DB est compromise, tout le monde est exposé
    }
    ```

    Tu dois toujours hasher les mots de passe avec `bcrypt` :
    ```bash
    pip install bcrypt flask-jwt-extended
    ```

    ---

    **JWT vs Sessions — Le comparatif**

    | Critère | Sessions | JWT |
    |---|---|---|
    | État | Côté serveur (stateful) | Côté client (stateless) |
    | Stockage serveur | Oui (en mémoire/Redis) | Non |
    | Scalabilité | Complexe (sticky sessions) | Facile (multi-serveurs) |
    | Révocation | Facile (supprimer la session) | Complexe (blacklist nécessaire) |
    | Mobile/API | Peu adapté | Idéal |
    | Microservices | Difficile | Parfait |

    **Pour une API REST → JWT est le choix standard.** Les sessions sont mieux adaptées aux applications web traditionnelles avec rendu côté serveur (Flask avec templates Jinja2 par exemple).

    ---

    **Implémentation complète avec JWT**

    ```python
    from flask import Flask, request, jsonify
    from flask_jwt_extended import (
        JWTManager, create_access_token,
        jwt_required, get_jwt_identity
    )
    import bcrypt

    app = Flask(__name__)
    app.config["JWT_SECRET_KEY"] = "change-moi-par-une-vraie-clé-secrète"  # En prod : variable d'environnement
    app.config["JWT_ACCESS_TOKEN_EXPIRES"] = 3600  # 1 heure en secondes

    jwt = JWTManager(app)

    # Simulation d'une base de données avec mots de passe hashés
    # En production, ces hashs viennent de ta vraie DB
    def creer_hash(mot_de_passe: str) -> str:
        return bcrypt.hashpw(mot_de_passe.encode(), bcrypt.gensalt()).decode()

    utilisateurs_db = {
        "alice": creer_hash("motdepasse123"),
        "bob": creer_hash("secret456")
    }

    @app.route('/login', methods=['POST'])
    def login():
        data = request.json
        if not data:
            return jsonify({"erreur": "Corps JSON requis"}), 400

        username = data.get('username', '').strip()
        password = data.get('password', '')

        if not username or not password:
            return jsonify({"erreur": "Username et password requis"}), 400

        hash_stocke = utilisateurs_db.get(username)

        # Vérification sécurisée (résistante aux timing attacks)
        if not hash_stocke or not bcrypt.checkpw(password.encode(), hash_stocke.encode()):
            return jsonify({"erreur": "Identifiants invalides"}), 401

        # Création du token JWT
        access_token = create_access_token(identity=username)
        return jsonify({
            "message": "Connexion réussie",
            "access_token": access_token
        }), 200

    # Route protégée — nécessite un token valide
    @app.route('/profil', methods=['GET'])
    @jwt_required()
    def profil():
        utilisateur_actuel = get_jwt_identity()
        return jsonify({
            "message": f"Bonjour {utilisateur_actuel}",
            "username": utilisateur_actuel
        }), 200

    if __name__ == '__main__':
        app.run(debug=True)
    ```

    ---

    **Comment l'utiliser côté client :**

    ```bash
    # 1. Se connecter et récupérer le token
    curl -X POST http://localhost:5000/login \
      -H "Content-Type: application/json" \
      -d '{"username": "alice", "password": "motdepasse123"}'

    # Réponse : {"access_token": "eyJ0eXAiOiJKV1QiLCJhbGci..."}

    # 2. Utiliser le token pour accéder à une route protégée
    curl http://localhost:5000/profil \
      -H "Authorization: Bearer eyJ0eXAiOiJKV1QiLCJhbGci..."
    ```

    ---

    **En production, pense aussi à :**
    - Stocker `JWT_SECRET_KEY` dans une variable d'environnement (`os.environ.get(...)`)
    - Utiliser HTTPS obligatoirement
    - Implémenter un refresh token pour renouveler les accès sans redemander le mot de passe
    - Mettre en place un rate limiting sur `/login` pour prévenir les attaques par force brute
    </answer>

