    <think>
    Analyse :
    La confusion entre `npm install` (utilisé en développement) et `npm ci` (utilisé en intégration continue) est très fréquente. `npm install` peut mettre à jour le `package-lock.json`, ce qui est dangereux en CI.
    
    Structure :
    1. Expliquer le rôle de `npm install` (création/modification).
    2. Expliquer le rôle de `npm ci` (reproduction stricte).
    3. Donner les cas d'usage précis (Dev vs CI/CD).
    </think>
    <answer>
    La différence est cruciale pour la stabilité de tes déploiements.

    **`npm install` (Le constructeur) :**
    - Il est fait pour le développement.
    - Il peut mettre à jour ton fichier `package-lock.json` si les versions dans `package.json` sont compatibles.
    - **Risque :** Si tu l'utilises en CI, tu risques d'installer des versions différentes de celles testées sur ta machine locale.

    **`npm ci` (L'exécuteur strict) :**
    - Il est conçu pour les environnements automatisés (CI/CD, serveurs de production).
    - Il **supprime** systématiquement le dossier `node_modules` avant de commencer.
    - Il **exige** la présence du fichier `package-lock.json`.
    - Il ne modifie jamais le `package-lock.json`. S'il y a une incohérence, il échoue.
    
    **Règle d'or :**
    - Utilise `npm install` quand tu ajoutes une nouvelle bibliothèque.
    - Utilise toujours `npm ci` dans tes pipelines de déploiement pour garantir que ton environnement de production est identique à 100% à ce que tu as validé en local.
    </answer>
