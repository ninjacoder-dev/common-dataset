    <answer>
    Le problème vient de l'utilisation de l'opérateur d'affectation `=` au lieu de l'opérateur de comparaison strict `===`.

    Voici le code corrigé :
    ```javascript
    const users = [{id: 1, active: true}, {id: 2, active: false}];
