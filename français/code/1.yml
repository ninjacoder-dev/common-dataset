    Analyse :
    La lenteur est probablement due à un "Full Table Scan". Bien que la requête soit simple, scanner 5 millions de lignes est coûteux. Le problème réside dans l'absence d'indexation appropriée sur les colonnes utilisées dans le WHERE.
    
    Structure :
    1. Diagnostiquer la cause (Full Table Scan).
    2. Proposer l'ajout d'un index composite.
