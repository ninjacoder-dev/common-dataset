    <user>
    Salut, je débute en JavaScript et j'essaie de comprendre les promesses et async/await. J'ai ce code qui ne fonctionne pas comme prévu :

    function recupererUtilisateur(id) {
      setTimeout(() => {
        return { id: id, nom: "Alice" };
      }, 1000);
    }

    const user = recupererUtilisateur(1);
    console.log(user); // affiche undefined !!

    Pourquoi est-ce que j'obtiens undefined ? Comment corriger ça ?
    </user>

output: |
    <think>
    Analyse :
    L'utilisateur a un problème classique pour les débutants en JavaScript : la confusion entre code synchrone et asynchrone.
    Le problème ici est que `setTimeout` est asynchrone. Le `return` à l'intérieur du callback de `setTimeout` ne retourne PAS la valeur à la fonction `recupererUtilisateur`. Il retourne la valeur au callback lui-même, qui est ignoré par `setTimeout`.

    Points à expliquer :
    1. Pourquoi `undefined` est retourné (la fonction se termine avant le setTimeout)
    2. La solution avec les callbacks (pour montrer l'évolution historique)
    3. La solution avec les Promises
    4. La solution moderne avec async/await
    5. Quel pattern privilégier aujourd'hui

    Structure :
    Je vais d'abord expliquer le problème fondamental, puis montrer les 3 approches en progression (callback → Promise → async/await) pour que l'utilisateur comprenne l'évolution et le "pourquoi" de async/await, pas juste le "comment".
    </think>
    <answer>
    Le problème vient du fait que `setTimeout` est **asynchrone**. Voici ce qui se passe réellement :

    ```javascript
    function recupererUtilisateur(id) {
      // 1. La fonction démarre
      setTimeout(() => {
        return { id: id, nom: "Alice" }; // 3. Ce return va NULLE PART (trop tard)
      }, 1000);
      // 2. La fonction se termine ici et retourne `undefined` implicitement
    }

    const user = recupererUtilisateur(1); // reçoit undefined immédiatement
    console.log(user); // undefined
    ```

    JavaScript n'attend pas le `setTimeout`. Il continue l'exécution, et quand le callback s'exécute 1 seconde plus tard, personne n'écoute son `return`.

    ---

    **Solution 1 — Callback (ancienne méthode)**
    ```javascript
    function recupererUtilisateur(id, callback) {
      setTimeout(() => {
        callback({ id: id, nom: "Alice" });
      }, 1000);
    }

    recupererUtilisateur(1, (user) => {
      console.log(user); // { id: 1, nom: "Alice" }
    });
    ```
    Problème : si tu chaînes plusieurs appels, tu tombes dans le "callback hell".

    ---

    **Solution 2 — Promise**
    ```javascript
    function recupererUtilisateur(id) {
      return new Promise((resolve, reject) => {
        setTimeout(() => {
          if (id > 0) {
            resolve({ id: id, nom: "Alice" });
          } else {
            reject(new Error("ID invalide"));
          }
        }, 1000);
      });
    }

    recupererUtilisateur(1)
      .then(user => console.log(user))
      .catch(err => console.error(err));
    ```

    ---

    **Solution 3 — async/await (recommandée aujourd'hui)**
    ```javascript
    function recupererUtilisateur(id) {
      return new Promise((resolve, reject) => {
        setTimeout(() => {
          if (id > 0) {
            resolve({ id: id, nom: "Alice" });
          } else {
            reject(new Error("ID invalide"));
          }
        }, 1000);
      });
    }

    async function afficherUtilisateur() {
      try {
        const user = await recupererUtilisateur(1);
        console.log(user); // { id: 1, nom: "Alice" }
      } catch (err) {
        console.error("Erreur :", err.message);
      }
    }

    afficherUtilisateur();
    ```

    **Points importants :**
    - `async/await` ne fait que "sucre syntaxique" autour des Promises, il ne crée pas une nouvelle magie
    - `await` ne peut s'utiliser qu'à l'intérieur d'une fonction `async`
    - Entoure toujours ton `await` d'un `try/catch` pour gérer les erreurs

    Pars directement sur `async/await` pour le nouveau code — c'est lisible, maintenable et c'est le standard actuel.
    </answer>

