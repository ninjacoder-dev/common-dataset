    <user>
    Bonjour, je travaille sur un projet React et j'ai un problème avec les re-renders inutiles. Mon application est devenue très lente. J'ai un composant parent qui passe des callbacks à plusieurs composants enfants, et chaque fois que le parent se re-render, tous les enfants se re-rendent aussi même si leurs props n'ont pas changé. Voici un exemple simplifié de ce que j'ai :

    function Parent() {
      const [compteur, setCompteur] = useState(0);
      const [texte, setTexte] = useState("");

      const handleClick = () => {
        console.log("Bouton cliqué");
      };

      return (
        <div>
          <input onChange={(e) => setTexte(e.target.value)} />
          <button onClick={() => setCompteur(c => c + 1)}>+1</button>
          <Enfant1 onAction={handleClick} />
          <Enfant2 onAction={handleClick} />
        </div>
      );
    }

    const Enfant1 = ({ onAction }) => {
      console.log("Enfant1 render");
      return <button onClick={onAction}>Action 1</button>;
    };

    Comment empêcher les re-renders inutiles ?
    </user>

output: |
    <think>
    Analyse :
    C'est une question classique d'optimisation React. Le problème a deux causes distinctes :

    1. **`handleClick` est recréée à chaque render du Parent**
       En JavaScript, chaque fois que `Parent` se re-render, `handleClick` est une **nouvelle fonction** (nouvelle référence en mémoire). Même si le contenu est identique, `onAction={handleClick}` transmet une prop "différente" aux enfants à chaque render. React voit un changement de prop et re-render les enfants.

    2. **Les composants enfants ne sont pas mémoïsés**
       Sans `React.memo`, un composant enfant se re-render dès que son parent se re-render, même si ses props n'ont pas changé.

    Solutions :
    - `useCallback` pour mémoïser les fonctions (stabiliser leur référence)
    - `React.memo` pour mémoïser les composants (éviter le re-render si les props n'ont pas changé)
    - `useMemo` pour mémoïser des valeurs calculées coûteuses (à mentionner comme complément)

    Pièges à mentionner :
    - `React.memo` seul ne suffit pas si les callbacks ne sont pas mémoïsés
    - `useCallback` seul ne suffit pas si les composants ne sont pas wrappés avec `React.memo`
    - Les deux doivent travailler ensemble
    - Ne pas sur-optimiser : profiler d'abord avec React DevTools

    Structure :
    1. Expliquer pourquoi les re-renders se produisent (le vrai problème)
    2. Solution en 2 parties : useCallback + React.memo
    3. Mentionner useMemo pour les valeurs
    4. Montrer comment utiliser React DevTools Profiler pour vérifier
    5. Mettre en garde contre la sur-optimisation
    </think>
    <answer>
    Le problème vient de deux causes combinées. Il faut les corriger ensemble, sinon ça ne marchera pas.

    ---

    **Cause 1 : `handleClick` change de référence à chaque render**

    ```javascript
    function Parent() {
      // À chaque render de Parent, handleClick est une NOUVELLE fonction en mémoire
      // Même code, mais référence différente → React pense que la prop a changé
      const handleClick = () => {
        console.log("Bouton cliqué");
      };
    }
    ```

    En JavaScript, `() => {}` crée un nouvel objet fonction à chaque exécution. `onAction={handleClick}` transmet donc une prop "différente" à chaque render du parent.

    **Cause 2 : Les enfants ne sont pas mémoïsés**

    Sans `React.memo`, un composant enfant se re-render automatiquement dès que son parent se re-render, peu importe ses props.

    ---

    **Solution : `useCallback` + `React.memo` (les deux ensemble)**

    ```javascript
    import { useState, useCallback, memo } from 'react';

    function Parent() {
      const [compteur, setCompteur] = useState(0);
      const [texte, setTexte] = useState("");

      // useCallback mémoïse la fonction — même référence entre les renders
      // Le tableau de dépendances [] signifie "ne jamais recréer cette fonction"
      const handleClick = useCallback(() => {
        console.log("Bouton cliqué");
      }, []); // Dépendances : si la fonction utilisait `compteur`, on mettrait [compteur]

      // Exemple avec dépendance
      const handleClickAvecCompteur = useCallback(() => {
        console.log(`Cliqué avec compteur = ${compteur}`);
      }, [compteur]); // Recréée seulement quand `compteur` change

      return (
        <div>
          <p>Compteur : {compteur}</p>
          <input onChange={(e) => setTexte(e.target.value)} value={texte} />
          <button onClick={() => setCompteur(c => c + 1)}>+1</button>
          <Enfant1 onAction={handleClick} />
          <Enfant2 onAction={handleClick} />
        </div>
      );
    }

    // React.memo mémoïse le composant — ne se re-render que si ses props changent réellement
    const Enfant1 = memo(({ onAction }) => {
      console.log("Enfant1 render"); // Ne s'affiche plus quand compteur ou texte change
      return <button onClick={onAction}>Action 1</button>;
    });

    const Enfant2 = memo(({ onAction }) => {
      console.log("Enfant2 render");
      return <button onClick={onAction}>Action 2</button>;
    });
    ```

    **Pourquoi les deux sont nécessaires :**
    - `React.memo` seul → les enfants comparent `onAction` ancienne vs nouvelle, mais elles sont différentes à chaque render (nouvelle référence) → re-render quand même
    - `useCallback` seul → la référence est stable, mais sans `memo`, l'enfant se re-render de toute façon quand le parent change
    - **Ensemble** → référence stable + comparaison des props → aucun re-render inutile ✓

    ---

    **Bonus : `useMemo` pour les valeurs calculées coûteuses**

    ```javascript
    // Sans useMemo : recalculé à chaque render du Parent
    const listeFiltrée = utilisateurs.filter(u => u.actif);

    // Avec useMemo : recalculé seulement si `utilisateurs` change
    const listeFiltrée = useMemo(() => {
      return utilisateurs.filter(u => u.actif);
    }, [utilisateurs]);
    ```

    ---

    **Comment vérifier avec React DevTools**

    Installe l'extension React DevTools dans Chrome/Firefox, puis :
    1. Ouvre les DevTools → onglet "Profiler"
    2. Clique "Record", interagis avec ton appli, clique "Stop"
    3. Les composants en couleur se sont re-rendus. Clique dessus pour voir **pourquoi** (props changed / state changed / parent re-rendered)

    ---

    **⚠️ Mise en garde : ne pas sur-optimiser**

    `useCallback` et `React.memo` ont un coût (comparaison des dépendances, overhead mémoire). Sur des petits composants simples, ils peuvent ralentir plutôt qu'accélérer. Applique-les :
    - Sur des composants coûteux à rendre (longues listes, graphiques)
    - Quand le Profiler confirme qu'il y a un problème
    - Pas systématiquement sur tous les composants
    </answer>

