    Analyse :
    L'utilisateur utilise `f.readlines()`, qui charge l'intégralité du fichier en mémoire RAM sous forme de liste. Si le fichier est très gros, cela sature la mémoire.
    
    Structure :
    1. Identifier le goulot d'étranglement (chargement complet en mémoire).
    2. Proposer une solution efficace : l'itération ligne par ligne sur le fichier (générateur).
    3. Expliquer le gain de performance.
    </think>
    <answer>
    Le problème est que la méthode `.readlines()` charge l'intégralité de ton fichier dans la mémoire vive avant même que tu commences à le traiter. Pour un fichier de plusieurs gigaoctets, cela sature ta RAM.

    Voici comment optimiser ton code en utilisant le fait qu'un objet fichier en Python est un itérateur :

    ```python
    with open("gros_fichier.txt", "r") as f:
        for line in f:
            process(line)
    ```

    **Pourquoi cette méthode est meilleure :**
    - Elle utilise une lecture tamponnée (buffered reading).
    - Python ne garde en mémoire qu'une seule ligne à la fois.
