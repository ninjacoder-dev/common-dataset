input: |
    <systme>
    Tu es un expert en bases de données et en systèmes transactionnels. Ton objectif est de garantir l'intégrité des données dans des environnements concurrents.
    </systme>
    <user>
    J'ai une application bancaire et parfois deux requêtes arrivent exactement en même temps, ce qui cause un problème de "race condition" sur le solde d'un compte. Comment résoudre cela ?
    </user>

output: |
    <think>
    Analyse :
    L'utilisateur fait face à une "Race Condition" (lecture-modification-écriture). Deux processus lisent un solde, calculent une nouvelle valeur, et réécrivent le solde, écrasant la modification de l'autre.
    
    Structure :
    1. Expliquer le problème de la lecture concurrentielle (Lost Update).
    2. Proposer deux approches : Verrouillage optimiste vs pessimiste.
    3. Recommander la meilleure pratique (Atomic update en SQL).
    </think>
    <answer>
    C'est un problème classique d'intégrité de données. Ne jamais calculer le solde dans ton code applicatif si tu peux le déléguer à la base de données.

    **La solution : Atomic Updates (Recommandée)**
    Au lieu de lire, calculer, et réécrire, effectue une mise à jour atomique directement via SQL :
    ```sql
    UPDATE comptes SET solde = solde - 50.00 WHERE id = 123 AND solde >= 50.00;
    ```
    - **Pourquoi ?** La base de données gère le verrouillage interne sur la ligne. Si la condition `solde >= 50.00` échoue, la transaction est annulée, évitant les soldes négatifs.

    **Si tu as besoin de gérer cela en code (Locking) :**
    - **Verrouillage Pessimiste :** Utilise `SELECT ... FOR UPDATE`. Cela bloque la ligne jusqu'à la fin de ta transaction. C'est sûr mais réduit la performance si beaucoup de transactions arrivent en même temps.
    - **Verrouillage Optimiste :** Ajoute une colonne `version`. À la mise à jour, vérifie `WHERE version = current_version`. Si quelqu'un a modifié la ligne avant toi, la version aura changé et ta requête échouera, te permettant de relancer l'opération.
    </answer>

input: |
    <systme>
    Tu es un expert en API Design et versioning. Tu prônes le principe de rétrocompatibilité.
    </systme>
    <user>
    Je dois modifier un endpoint d'API qui est déjà utilisé par des clients externes. Comment faire pour ne pas tout casser chez eux ?
    </user>

output: |
    <think>
    Analyse :
    La modification d'une API publique pose le problème de la rupture de contrat (Breaking Change). Il faut un processus de migration doux pour les utilisateurs.
    
    Structure :
    1. Établir la règle d'or : Ne jamais modifier, toujours étendre.
    2. Présenter les stratégies de versioning (URL vs Header).
    3. Expliquer le cycle de dépréciation (Deprecated -> Sunset).
    </think>
    <answer>
    Ne jamais modifier le comportement existant d'un endpoint public. La règle d'or est : **Une API est un contrat.**

    **Voici la marche à suivre :**
    1. **Versionnage par URL :** Si le changement est structurel (changement de format JSON, suppression de champs), crée une nouvelle version : `/api/v2/utilisateurs` au lieu de `/api/v1/utilisateurs`.
    2. **Dépréciation :** Laisse l'ancienne version active pendant une période de transition. Ajoute un header dans la réponse : `Warning: 299 - "This endpoint is deprecated and will be removed on 2025-01-01"`.
    3. **Stratégie d'extension :** Si tu ajoutes juste des champs, tu n'as pas besoin de changer la version. Les clients qui ne connaissent pas ces nouveaux champs les ignoreront simplement.
    4. **Documentation :** Communique clairement la date de fin de vie de la `v1` à tes utilisateurs.

    **Conseil :** Si tu dois absolument faire un changement non compatible, crée une route parallèle et utilise des "Feature Flags" pour basculer les utilisateurs progressivement vers la nouvelle version.
    </answer>

input: |
    <systme>
    Tu es un expert en architecture microservices et en patterns de communication.
    </systme>
    <user>
    Mes microservices communiquent entre eux avec des requêtes HTTP (REST) et c'est devenu très lent car les services attendent les uns les autres. Comment améliorer ça ?
    </user>

output: |
    <think>
    Analyse :
    L'utilisateur souffre du couplage synchrone (Request/Response) dans un environnement distribué. Le système est aussi lent que le plus lent des services (chaînage des latences).
    
    Structure :
    1. Identifier le problème : Couplage temporel.
    2. Introduire le pattern Event-Driven (Architecture pilotée par les événements).
    3. Proposer l'utilisation d'un Message Broker (RabbitMQ, Kafka).
    </think>
    <answer>
    Ton architecture souffre d'un **couplage temporel**. Dès que tu enchaînes des appels HTTP, tu crées une dépendance où le Service A attend le Service B qui attend le Service C.

    **La solution : Architecture orientée événements (Event-Driven)**
    Au lieu de demander à un service de faire quelque chose :
    1. **Publie un événement :** Le Service A effectue son action et envoie un message sur un **Message Broker** (ex: RabbitMQ ou Kafka).
    2. **Consommation asynchrone :** Le Service B écoute ces messages, les traite quand il est prêt, et ne bloque personne.
    
    **Pourquoi c'est mieux ?**
    - **Découplage :** Le Service A n'a même pas besoin de savoir que le Service B existe.
    - **Résilience :** Si le Service B tombe, le message est mis en file d'attente. Il le traitera dès son redémarrage. Pas de perte de données.
    - **Performance :** L'utilisateur final reçoit une réponse immédiate, le traitement lourd se fait en arrière-plan.
    </answer>

input: |
    <systme>
    Tu es un mentor en Git et en gestion de workflow. Tu privilégies la clarté historique.
    </systme>
    <user>
    On est 5 sur un projet et c'est le chaos dans les merges. On a des conflits tout le temps, comment s'organiser ?
    </user>

output: |
    <think>
    Analyse :
    Le chaos dans les merges indique un manque de stratégie de branchement (Branching Strategy). Les développeurs travaillent trop longtemps sur des branches sans synchronisation.
    
    Structure :
    1. Imposer un workflow (GitFlow ou GitHub Flow).
    2. Recommander des branches courtes (Short-lived branches).
    3. Introduire le concept de "Rebase" pour garder un historique linéaire.
    </think>
    <answer>
    Le chaos vient du fait que vous travaillez sur des branches trop longues. Plus une branche vit longtemps, plus le conflit lors du merge est inévitable.

    **Voici comment stabiliser votre workflow :**
    1. **Branches éphémères :** Une branche doit correspondre à une seule fonctionnalité. Elle doit être fusionnée (ou supprimée) en moins de 2 jours.
    2. **Pull souvent :** Avant de commencer ta journée, `git pull --rebase origin main`. Cela intègre le travail des autres dans ton historique avant que tes propres changements ne soient trop éloignés.
    3. **Atomic Commits :** Fais des petits commits qui ne font qu'une seule chose. Il est plus facile de résoudre un conflit sur 5 lignes que sur 500.
    4. **Code Review obligatoire :** Utilisez les "Pull Requests" (ou Merge Requests). C'est le moment idéal pour discuter des conflits potentiels avant qu'ils n'atteignent la branche principale.
    
    **Astuce :** Forcez l'utilisation de `git rebase` au lieu de `git merge` pour les mises à jour locales, cela rendra votre historique de projet parfaitement linéaire et lisible.
    </answer>

