output: |
    <think>
    Analyse :
    Ce code a plusieurs problèmes critiques en C :

    1. **Bug majeur : retour d'un pointeur vers une variable locale (stack)**
       `buffer` est alloué sur la pile (stack) de la fonction `lire_fichier`. Quand la fonction retourne, cette mémoire est libérée (et peut être réutilisée par d'autres appels de fonctions). Le pointeur retourné pointe vers de la mémoire invalide → comportement indéfini → segfault.

    2. **Absence de vérification de `fopen`**
       Si le fichier n'existe pas, `fopen` retourne NULL. `fgets(buffer, 1024, NULL)` → segfault immédiat.

    3. **Lecture d'une seule ligne**
       `fgets` lit seulement jusqu'au premier `\n` ou 1023 caractères. Si le fichier fait plusieurs lignes ou plus de 1024 caractères, le contenu est tronqué sans avertissement.

    4. **Fichier jamais fermé**
       `fclose` n'est jamais appelé → fuite de descripteur de fichier.

    Solutions à présenter :
    - Expliquer clairement le problème de stack vs heap
    - Solution avec malloc (allocation dynamique)
    - Gérer correctement tous les cas d'erreur
    - Version améliorée qui lit tout le fichier
    - Rappel sur la responsabilité de free() côté appelant

    Structure :
    Je vais lister les problèmes dans l'ordre de gravité, expliquer le concept fondamental stack vs heap, puis donner une version corrigée complète avec gestion des erreurs.
    </think>
    <answer>
    Ton code a **4 problèmes**, dont un qui est la cause directe de ton segfault.

    ---

    **Problème 1 (CRITIQUE) : Retour d'un pointeur vers la pile**

    ```c
    char buffer[1024];  // Alloué sur la PILE (stack) de lire_fichier
    // ...
    return buffer;      // ← UNDEFINED BEHAVIOR !
    ```

    La pile fonctionne comme une pile d'assiettes : quand `lire_fichier` se termine, son "assiette" (son frame de pile) est retirée. La mémoire de `buffer` est immédiatement réutilisable pour d'autres appels. Ton `main` pointe donc vers de la mémoire invalide.

    ```
    Mémoire pendant lire_fichier :   Mémoire après return :
    ┌──────────────────────┐         ┌──────────────────────┐
    │ main()               │         │ main()               │
    │  contenu = [ptr]─────┼──┐      │  contenu = [ptr]─────┼──┐
    ├──────────────────────┤  │      ├──────────────────────┤  │
    │ lire_fichier()       │  │      │ [libéré / corrompu]  │◄─┘  ← segfault !
    │  buffer = "Hello..." │◄─┘      │                      │
    └──────────────────────┘         └──────────────────────┘
    ```

    **Problème 2 : Pas de vérification de `fopen`**
    ```c
    FILE* f = fopen(chemin, "r");
    fgets(buffer, 1024, f);  // Si f == NULL → segfault garanti
    ```

    **Problème 3 : Lecture d'une seule ligne avec taille fixe**
    `fgets` s'arrête au premier `\n`. Les fichiers de plus de 1023 caractères seront tronqués silencieusement.

    **Problème 4 : Fuite de descripteur de fichier**
    `fclose(f)` n'est jamais appelé. Sur un serveur qui appelle cette fonction souvent, tu épuiseras les descripteurs disponibles.

    ---

    **Version corrigée — lecture complète avec allocation dynamique**

    ```c
    #include <stdio.h>
    #include <stdlib.h>
    #include <string.h>

    /*
     * Lit tout le contenu d'un fichier et le retourne dans un buffer alloué dynamiquement.
     * IMPORTANT : L'appelant est responsable d'appeler free() sur le pointeur retourné.
     * Retourne NULL en cas d'erreur.
     */
    char* lire_fichier(const char* chemin) {
        FILE* f = fopen(chemin, "r");
        if (f == NULL) {
            fprintf(stderr, "Erreur : impossible d'ouvrir '%s'\n", chemin);
            return NULL;
        }

        // Déterminer la taille du fichier
        fseek(f, 0, SEEK_END);
        long taille = ftell(f);
        fseek(f, 0, SEEK_SET);

        if (taille < 0) {
            fprintf(stderr, "Erreur : impossible de déterminer la taille du fichier\n");
            fclose(f);
            return NULL;
        }

        // Allouer sur le tas (heap) — survit au retour de la fonction
        char* contenu = malloc(taille + 1);  // +1 pour le '\0' final
        if (contenu == NULL) {
            fprintf(stderr, "Erreur : allocation mémoire échouée\n");
            fclose(f);
            return NULL;
        }

        // Lire tout le fichier
        size_t lu = fread(contenu, 1, taille, f);
        contenu[lu] = '\0';  // Terminer la chaîne

        fclose(f);  // Toujours fermer le fichier
        return contenu;
    }

    int main() {
        char* contenu = lire_fichier("test.txt");
        if (contenu == NULL) {
            return 1;
        }

        printf("%s\n", contenu);

        free(contenu);  // L'appelant libère la mémoire allouée par la fonction
        contenu = NULL; // Bonne pratique : éviter les dangling pointers
        return 0;
    }
    ```

    ---

    **Règle d'or en C pour la mémoire :**

    | Stockage | Durée de vie | Utilisation |
    |---|---|---|
    | Stack (`char buf[N]`) | Jusqu'à la fin de la fonction | Variables locales temporaires |
    | Heap (`malloc`) | Jusqu'à `free()` | Données à retourner ou à longue durée de vie |
    | Global/static | Durée du programme | Configuration, singletons |

    Ne jamais retourner un pointeur vers la stack. Si une fonction doit retourner des données allouées, utilise `malloc` et documente clairement qui est responsable du `free()`.
    </answer>

