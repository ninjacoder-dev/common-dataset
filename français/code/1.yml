    Analyse :
    L'utilisateur utilise mal les codes d'état HTTP. Le code 500 est réservé aux erreurs serveur. Il doit implémenter une gestion fine des erreurs pour retourner les bons codes (4xx pour le client, 5xx pour le serveur).
    
    Structure :
    1. Expliquer la sémantique des codes HTTP (4xx vs 5xx).
    2. Proposer une structure de réponse JSON standardisée pour les erreurs.
    3. Donner des exemples concrets pour le développement.
    </think>
    <answer>
    Utiliser le code 500 pour des erreurs clients est une mauvaise pratique qui empêche tes utilisateurs de comprendre ce qu'ils font de mal. Voici comment structurer tes erreurs :

    **1. Choisir le bon code :**
    - **400 Bad Request :** Erreur de syntaxe dans la requête ou validation des données échouée.
    - **401 Unauthorized :** L'utilisateur n'est pas authentifié.
    - **403 Forbidden :** L'utilisateur est authentifié mais n'a pas la permission.
    - **404 Not Found :** La ressource n'existe pas.
    - **422 Unprocessable Entity :** Données valides au format JSON, mais invalides pour ta logique métier.

    **2. Standardiser le corps de la réponse :**
    Ne renvoie jamais juste un texte brut. Utilise une structure JSON cohérente :
    ```json
    {
      "error": {
        "code": "INVALID_EMAIL",
        "message": "Le format de l'adresse email est invalide.",
        "details": { "field": "email" }
      }
    }
    ```
    
    **Conseil :** Implémente un "Global Error Handler" dans ton framework (Express, Flask, FastAPI) pour intercepter les exceptions et mapper automatiquement les erreurs métier vers ces codes HTTP.
    </answer>

input: |
